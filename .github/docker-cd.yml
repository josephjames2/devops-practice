name: Docker Build & Push (Main)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional semantic version tag (e.g., v1.0.0)"
        required: false
        default: ""

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devops-practice

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          BRANCH=${GITHUB_REF_NAME}
          # sanitize branch name for tags
          BRANCH_SAFE=$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT
          echo "branch_tag=$BRANCH_SAFE" >> $GITHUB_OUTPUT
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version_tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version_tag=" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.branch_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show published tags
        run: |
          echo "Published:"
          echo " - ${{ env.IMAGE_NAME }}:latest"
          echo " - ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}"
          echo " - ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.branch_tag }}"
          if [ -n "${{ steps.meta.outputs.version_tag }}" ]; then
            echo " - ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_tag }}"
          fi
